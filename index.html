<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReportsTo — Coming Soon</title>
  <meta name="description" content="Verified reviews of individual managers and executives. The specific person you'd be reporting to." />
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf8f5;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: #C4593A;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .hero {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.55;
      color: #1a1a1a;
      margin-bottom: 2rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #ddd8d0;
      margin: 0 auto 2rem;
    }

    .status {
      font-size: 13px;
      color: #999;
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
    }

    .github-link {
      font-size: 13px;
      color: #C4593A;
      text-decoration: none;
      border-bottom: 1px solid #e8b5a4;
      padding-bottom: 2px;
      letter-spacing: 0.03em;
      transition: border-color 0.15s;
    }

    .github-link:hover {
      border-color: #C4593A;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-size: 12px;
      color: #ccc;
    }

    @media (max-width: 480px) {
      .hero { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ReportsTo</div>
    <h1 class="hero">The right manager can change your career. The wrong one can derail it.</h1>
    <div class="divider"></div>
    <p class="status">Coming soon</p>
    <a class="github-link" href="https://github.com/megandeemoore/reportsto" target="_blank" rel="noopener">View the project on GitHub →</a>
  </div>
  <p class="footer">© 2026 Megan Moore</p>
</body>
</html>
